</div>

</div>
</div>

</div>
</div>
<!-- Time -->

<label class="font-label-md text-label-md uppercase text-on-tertiary-container">Time (HH:MM)</label>

</div>
</div>

<span class="absolute left-4 material-symbols-outlined text-outline">landscape</span>

</div>
</div>
</div>
